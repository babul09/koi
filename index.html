<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Go WebAssembly</title>
    <!-- Import the Go JavaScript bridge -->
    <script src="wasm_exec.js"></script>
    <script>
        // Initialize the Go runtime
        const go = new Go();

        // Stream and instantiate the compiled WebAssembly binary
        WebAssembly.instantiateStreaming(fetch("game.wasm"), go.importObject)
            .then((result) => {
                // Execute the Go code
                go.run(result.instance);
            })
            .catch((err) => {
                console.error("Failed to load WASM:", err);
            });
    </script>
    <style>
    body, html {
        margin: 0;
        padding: 0;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100vh;
        overflow: hidden;
    }
    canvas {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain; /* Keeps game from stretching out of proportion */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }
</style>
</head>
<body>
    <!-- Kept completely empty so the canvas centers perfectly -->
</body>
</html>
